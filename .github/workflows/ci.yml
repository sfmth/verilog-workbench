name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  distro-validation:
    name: Main validation - ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 24.04
            image: ubuntu:24.04
          - name: Debian stable
            image: debian:stable-slim
          - name: Fedora current
            image: fedora:latest
          - name: Arch rolling
            image: archlinux:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install the full distro toolchain and run main validation
        run: |
          docker run --rm \
            -v "$PWD:/workspace:ro" \
            -w /workspace \
            "${{ matrix.image }}" \
            bash -lc '
              set -euo pipefail
              ./setup.sh --full --no-aur
              export PATH="$HOME/.local/share/verilog-workbench/venv/bin:$HOME/.local/bin:$PATH"
              python3 scripts/validate_vwb.py \
                --representative-modules \
                --synth-format png \
                --portable-tools
            '

  container-image:
    name: Build and verify the complete Docker toolchain
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build validation image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: verilog-workbench-ci:${{ github.sha }}
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci

      - name: Verify the Docker toolchain
        run: |
          docker run --rm --network none \
            verilog-workbench-ci:${{ github.sha }} \
            python3 scripts/validate_vwb.py \
              --phase doctor
