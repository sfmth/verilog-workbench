name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Ten representative modules plus CLI and fixture checks
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build validation image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: verilog-workbench-ci:${{ github.sha }}
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci

      - name: Validate the representative module profile and all CLI options
        run: |
          docker run --rm --network none \
            verilog-workbench-ci:${{ github.sha }} \
            python3 scripts/validate_vwb.py \
              --representative-modules \
              --all-wave-formats \
              --synth-option-matrix
